name: CI/CD Irrigação Inteligente  # nome do workflow

on:
  # botão "Run workflow" com parâmetros
  workflow_dispatch:
    inputs:
      run_train:
        description: "Rodar treino de ML?"
        type: choice
        options: [ "yes", "no" ]
        default: "yes"
      run_build:
        description: "Rodar build do firmware?"
        type: choice
        options: [ "yes", "no" ]
        default: "yes"
      deploy_ota:
        description: "Fazer OTA no ESP32?"
        type: choice
        options: [ "yes", "no" ]
        default: "no"

jobs:

  # =========================
  # 1) Treino de ML (self-hosted)
  # =========================
  train-ml:
    if: ${{ github.event.inputs.run_train == 'yes' }}   # roda só se for "yes"
    runs-on: [self-hosted, Linux, X64]                  # seu runner local
    steps:
      - name: Checkout
        uses: actions/checkout@v4                       # baixa o código

      - name: Setup Python
        uses: actions/setup-python@v5                   # provisiona Python
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r coleta_dados/requirements.txt   # dependências do treino

      - name: Run training
        run: python coleta_dados/treinar_modelo.py          # gera artefatos (ia_params.h, pkl, csv)

      - name: Upload ML artifacts
        uses: actions/upload-artifact@v4                    # publica artefatos p/ outros jobs
        with:
          name: ml-artifacts
          path: |
            coleta_dados/ia_params.h
            coleta_dados/*.pkl
            coleta_dados/*.csv

  # ===================================
  # 2) Build do firmware ESP32 (GitHub-hosted)
  #    -> usa action oficial da Espressif CORRETA
  # ===================================
  build-firmware:
    if: ${{ github.event.inputs.run_build == 'yes' }}   # roda só se for "yes"
    runs-on: ubuntu-latest                              # runner do GitHub

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # baixa artefatos de ML apenas se o treino rodou neste workflow
      - name: Download ML artifacts (if trained)
        if: ${{ github.event.inputs.run_train == 'yes' }}
        uses: actions/download-artifact@v4
        with:
          name: ml-artifacts
          path: esp32_firmware/components/ml            # onde o firmware espera encontrar

      # Action CORRETA da Espressif para preparar o ESP-IDF
      - name: Setup ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4                         # alinha com seu projeto (5.4.x)

      - name: Build firmware
        run: |
          # gera uma versão amigável (branch-sha-data-runN)
          GIT_BRANCH="${GITHUB_REF_NAME}"
          GIT_SHA_SHORT="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          BUILD_DATE="$(date -u +%Y%m%d)"
          FW_VERSION="${GIT_BRANCH}-${GIT_SHA_SHORT}-${BUILD_DATE}-run${GITHUB_RUN_NUMBER}"
          echo "Firmware version: ${FW_VERSION}"

          cd esp32_firmware
          idf.py -DPROJECT_VER="${FW_VERSION}" build     # compila

          # Garante o nome final do bin (caso seu CMake já não renomeie)
          if [ -f build/ia_automated_irrigation_system.bin ]; then
            echo "Arquivo final já está com o nome esperado."
          else
            # tenta descobrir o .bin principal (app) e renomeia
            APP_BIN="$(ls -1 build/*.bin | grep -E '/(project|app|.*)\.bin$' || true)"
            if [ -z "$APP_BIN" ]; then
              # fallback: pega o maior .bin (normalmente o app)
              APP_BIN="$(ls -S build/*.bin | head -n1)"
            fi
            echo "Renomeando $APP_BIN -> build/ia_automated_irrigation_system.bin"
            cp "$APP_BIN" build/ia_automated_irrigation_system.bin
          fi

      - name: Upload firmware
        uses: actions/upload-artifact@v4                 # publica o .bin para o job de OTA
        with:
          name: firmware-bin
          path: esp32_firmware/build/ia_automated_irrigation_system.bin

  # =========================
  # 3) OTA para o ESP32 (self-hosted)
  # =========================
  ota-deploy:
    if: ${{ github.event.inputs.deploy_ota == 'yes' }}  # roda só se for "yes"
    runs-on: [self-hosted, Linux, X64]                  # precisa estar na mesma rede do ESP32
    needs: [build-firmware]                             # garante que o binário existe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download firmware
        uses: actions/download-artifact@v4              # traz o .bin gerado no build
        with:
          name: firmware-bin
          path: .

      - name: Deploy OTA to ESP32
        env:
          OTA_TOKEN: ${{ secrets.OTA_TOKEN }}          # token Bearer salvo nos Secrets
          ESP32_IP:  ${{ secrets.ESP32_IP }}           # IP do seu device
          OTA_PORT:  ${{ secrets.OTA_PORT }}           # porta (ex.: 8070)
        run: |
          # envia binário via HTTP/1.1 para o endpoint /ota do seu firmware
          curl -v --http1.1 \
            -H "Connection: close" \
            -H "Content-Type: application/octet-stream" \
            -H "Authorization: Bearer ${OTA_TOKEN}" \
            --data-binary @ia_automated_irrigation_system.bin \
            http://${ESP32_IP}:${OTA_PORT}/ota
