# CI/CD do meu projeto de Irrigação Inteligente
# Objetivo: compilar o firmware ESP32-S3 no meu runner e fazer OTA na placa.
# O treino de ML é opcional: se eu mandar treinar, o build usa o artefato;
# se não, o build usa o ia_params.h que já está versionado no repo.

name: CI/CD Irrigação Inteligente

on:
  # Disparo manualmente e só escolho se quero treinar ou não
  workflow_dispatch:
    inputs:
      run_train:
        description: "Rodar treino de ML?"
        type: choice
        options: ["yes","no"]
        default: "no"

jobs:
  # 1) Treino de ML (self-hosted, OPCIONAL)
  train-ml:
    # Eu sempre executo o job pra não bloquear ninguém,
    # mas as etapas só rodam quando eu seleciono "yes".
    runs-on: [self-hosted, Linux, X64]
    outputs:
      did_train: ${{ steps.flags.outputs.did_train }}  # flag dizendo se treinei
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (só se eu mandei treinar)
        if: ${{ github.event.inputs.run_train == 'yes' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (só se eu mandei treinar)
        if: ${{ github.event.inputs.run_train == 'yes' }}
        run: pip install -r treinamento_externo/requirements.txt

      - name: Run training (gera ia_params.h, etc)
        if: ${{ github.event.inputs.run_train == 'yes' }}
        run: python treinamento_externo/treinar_modelo.py

      - name: Upload ML artifacts (disponibiliza pro build)
        if: ${{ github.event.inputs.run_train == 'yes' }}
        uses: actions/upload-artifact@v4
        with:
          name: ml-artifacts
          path: |
            treinamento_externo/ia_params.h
            treinamento_externo/*.pkl
            treinamento_externo/*.csv

      - name: Set train flag (true/false)
        id: flags
        run: |
          if [ "${{ github.event.inputs.run_train }}" = "yes" ]; then
            echo "did_train=true" >> "$GITHUB_OUTPUT"
          else
            echo "did_train=false" >> "$GITHUB_OUTPUT"
          fi

  # 2) Build do firmware ESP32 (SELF-HOSTED) — OBRIGATÓRIO
  build-firmware:
    # compilo no meu runner pra reaproveitar o toolchain/IDF local
    runs-on: [self-hosted, Linux, X64]
    # espero o job de treino (ele sempre finaliza; pode ter treinado ou não)
    needs: [train-ml]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Se treinei agora, baixo os artefatos; senão, vou usar os arquivos do repo
      - name: Download ML artifacts (only if trained)
        if: ${{ needs['train-ml'].outputs.did_train == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: ml-artifacts
          path: ml-artifacts

      # Escolho a fonte do ia_params.h:
      # 1) se veio do treino, usa o artefato;
      # 2) caso contrário, usa o arquivo versionado no repo (fallback).
      - name: Place ML header (artifact or repo fallback)
        run: |
          set -euo pipefail
          mkdir -p esp32_firmware/main/ia
          if [ -f ml-artifacts/ia_params.h ]; then
            cp ml-artifacts/ia_params.h esp32_firmware/main/ia/ia_params.h
            echo "Usando ia_params.h do artefato de treino."
          elif [ -f ia_params.h ]; then
            cp ia_params.h esp32_firmware/main/ia/ia_params.h
            echo "Usando ia_params.h versionado no repositório."
          else
            echo "::error::ia_params.h não encontrado nem no artefato nem no repo."
            exit 1
          fi

      # build do ESP-IDF (carrego o export.sh no MESMO step)
      - name: Build firmware
        working-directory: esp32_firmware
        run: |
          set -euo pipefail
          source "$HOME/esp/esp-idf/export.sh"
          idf.py set-target esp32s3

          # versão do firmware com branch + sha curto + data + número do run
          GIT_BRANCH="${GITHUB_REF_NAME}"
          GIT_SHA_SHORT="${GITHUB_SHA:0:7}"
          BUILD_DATE="$(date -u +%Y%m%d)"
          FW_VERSION="${GIT_BRANCH}-${GIT_SHA_SHORT}-${BUILD_DATE}-run${GITHUB_RUN_NUMBER}"
          idf.py -DPROJECT_VER="${FW_VERSION}" build

          # se o nome final não existir, padronizo pegando o maior .bin (app)
          [ -f build/ia_automated_irrigation_system.bin ] || cp "$(ls -S build/*.bin | head -n1)" build/ia_automated_irrigation_system.bin

      - name: Upload firmware (.bin) para o job de OTA
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: esp32_firmware/build/ia_automated_irrigation_system.bin

  # 3) OTA (SELF-HOSTED) — OBRIGATÓRIO
  ota-deploy:
    # eu sempre faço OTA depois do build (obrigatório)
    runs-on: [self-hosted, Linux, X64]
    needs: [build-firmware]
    env:
      ESP32_IP:  ${{ secrets.ESP32_IP }}     # ex.: 192.168.1.9
      OTA_PORT:  ${{ secrets.OTA_PORT }}     # ex.: 8070
      OTA_TOKEN: ${{ secrets.OTA_TOKEN }}    # se o handler /ota usa Bearer
    steps:
      - name: Download firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware-bin
          path: .

      - name: Deploy OTA (POST octet-stream no /ota)
        run: |
          set -euo pipefail
          HDR_AUTH=()
          [ -n "${OTA_TOKEN:-}" ] && HDR_AUTH+=( -H "Authorization: Bearer ${OTA_TOKEN}" )
          curl -v --http1.1 --fail-with-body \
            -H "Connection: close" \
            -H "Content-Type: application/octet-stream" \
            "${HDR_AUTH[@]}" \
            --data-binary @ia_automated_irrigation_system.bin \
            "http://${ESP32_IP}:${OTA_PORT}/ota"
