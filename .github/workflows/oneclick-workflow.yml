# CI/CD do projeto de Irrigação Inteligente
# Meta: compilar o firmware ESP32-S3 no runner self-hosted e realizar OTA na placa.
# O treino de ML é opcional: se acionado, o build usa o artefato; caso contrário, usa o ia_params.h versionado no repositório.

name: CI/CD Irrigação Inteligente

on:
  # Disparo manual com opção apenas para o treino
  workflow_dispatch:
    inputs:
      run_train:
        description: "Rodar treino de ML?"
        type: choice
        options: ["yes","no"]
        default: "no"

jobs:
  # 1) Treino de ML (self-hosted, OPCIONAL)
  train-ml:
    # Executa sempre o job; etapas internas só rodam quando run_train == "yes".
    runs-on: [self-hosted, Linux, X64]
    outputs:
      did_train: ${{ steps.flags.outputs.did_train }}  # expõe flag indicando se houve treino
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (apenas quando o treino for solicitado)
        if: ${{ github.event.inputs.run_train == 'yes' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências (apenas quando o treino for solicitado)
        if: ${{ github.event.inputs.run_train == 'yes' }}
        run: pip install -r treinamento_externo/requirements.txt

      - name: Executar treino (gera ia_params.h, etc.)
        if: ${{ github.event.inputs.run_train == 'yes' }}
        run: python treinamento_externo/treinar_modelo.py

      - name: Publicar artefatos de ML (disponibiliza para o build)
        if: ${{ github.event.inputs.run_train == 'yes' }}
        uses: actions/upload-artifact@v4
        with:
          name: ml-artifacts
          path: |
            treinamento_externo/ia_params.h
            treinamento_externo/*.pkl
            treinamento_externo/*.csv

      - name: Definir flag de treino (true/false)
        id: flags
        run: |
          if [ "${{ github.event.inputs.run_train }}" = "yes" ]; then
            echo "did_train=true" >> "$GITHUB_OUTPUT"
          else
            echo "did_train=false" >> "$GITHUB_OUTPUT"
          fi

  # 2) Build do firmware ESP32 (SELF-HOSTED) — OBRIGATÓRIO
  build-firmware:
    # Compila no runner self-hosted para reaproveitar o toolchain/ESP-IDF local.
    runs-on: [self-hosted, Linux, X64]
    # Aguarda o job de treino (sempre finaliza; pode ou não treinar).
    needs: [train-ml]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Se houve treino neste run, baixa os artefatos; caso contrário, usará o arquivo versionado.
      - name: Baixar artefatos de ML (somente quando houve treino)
        if: ${{ needs['train-ml'].outputs.did_train == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: ml-artifacts
          path: ml-artifacts

      # Seleciona a origem do ia_params.h:
      # 1) artefato gerado no treino; 2) arquivo versionado em treinamento_externo/; 3) raiz (fallback final).
      - name: Posicionar header de ML (artefato ou fallback do repositório)
        run: |
          set -euo pipefail
          mkdir -p esp32_firmware/main/ia

          if [ -f ml-artifacts/ia_params.h ]; then
            SRC="ml-artifacts/ia_params.h"
            echo "Usando ia_params.h do artefato de treino: $SRC"
          elif [ -f treinamento_externo/ia_params.h ]; then
            SRC="treinamento_externo/ia_params.h"
            echo "Usando ia_params.h versionado: $SRC"
          elif [ -f ia_params.h ]; then
            SRC="ia_params.h"
            echo "Usando ia_params.h na raiz: $SRC"
          else
            echo "::error::ia_params.h não encontrado. Procurado em:"
            echo " - ml-artifacts/ia_params.h"
            echo " - treinamento_externo/ia_params.h"
            echo " - ia_params.h (raiz)"
            exit 1
          fi

          cp "$SRC" esp32_firmware/main/ia/ia_params.h
          ls -l esp32_firmware/main/ia/

      # Build do ESP-IDF: carrega-se o export.sh no MESMO step (não há herança entre steps).
      - name: Compilar firmware
        working-directory: esp32_firmware
        run: |
          set -euo pipefail
          source "$HOME/esp/esp-idf/export.sh"
          idf.py set-target esp32s3

          # Versão do firmware: branch + SHA curto + data + número do run
          GIT_BRANCH="${GITHUB_REF_NAME}"
          GIT_SHA_SHORT="${GITHUB_SHA:0:7}"
          BUILD_DATE="$(date -u +%Y%m%d)"
          FW_VERSION="${GIT_BRANCH}-${GIT_SHA_SHORT}-${BUILD_DATE}-run${GITHUB_RUN_NUMBER}"
          idf.py -DPROJECT_VER="${FW_VERSION}" build

          # Se o nome final não existir, padroniza pegando o maior .bin (app)
          [ -f build/ia_automated_irrigation_system.bin ] || cp "$(ls -S build/*.bin | head -n1)" build/ia_automated_irrigation_system.bin

      - name: Publicar firmware (.bin) para o job de OTA
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: esp32_firmware/build/ia_automated_irrigation_system.bin

  # 3) OTA (SELF-HOSTED) — OBRIGATÓRIO
  ota-deploy:
    # Realiza OTA após o build.
    runs-on: [self-hosted, Linux, X64]
    needs: [build-firmware]
    env:
      ESP32_IP:  ${{ secrets.ESP32_IP }}     # ex.: 192.168.1.9
      OTA_PORT:  ${{ secrets.OTA_PORT }}     # ex.: 8070
      OTA_TOKEN: ${{ secrets.OTA_TOKEN }}    # se o endpoint /ota exigir Bearer
    steps:
      - name: Baixar firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware-bin
          path: .

      - name: Enviar OTA (POST octet-stream em /ota)
        run: |
          set -euo pipefail
          HDR_AUTH=()
          [ -n "${OTA_TOKEN:-}" ] && HDR_AUTH+=( -H "Authorization: Bearer ${OTA_TOKEN}" )
          curl -v --http1.1 --fail-with-body \
            -H "Connection: close" \
            -H "Content-Type: application/octet-stream" \
            "${HDR_AUTH[@]}" \
            --data-binary @ia_automated_irrigation_system.bin \
            "http://${ESP32_IP}:${OTA_PORT}/ota"
