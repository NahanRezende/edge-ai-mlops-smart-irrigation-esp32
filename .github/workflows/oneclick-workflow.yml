name: CI/CD Irrigação Inteligente  # nome do workflow exibido no GitHub

on:
  workflow_dispatch:                # permite rodar manualmente pelo botão "Run workflow"
    inputs:
      run_train:                    # input: executar treino de ML?
        description: "Rodar treino de ML?"
        type: choice
        options: [ "yes", "no" ]
        default: "yes"
      run_build:                    # input: compilar firmware?
        description: "Rodar build do firmware?"
        type: choice
        options: [ "yes", "no" ]
        default: "yes"
      deploy_ota:                   # input: fazer OTA no dispositivo?
        description: "Fazer OTA no ESP32?"
        type: choice
        options: [ "yes", "no" ]
        default: "no"

jobs:

  # -------------------------
  # 1) Treino de ML (portável)
  # -------------------------
  train-ml:
    if: ${{ github.event.inputs.run_train == 'yes' }}   # só roda se o input for "yes"
    runs-on: ubuntu-latest                              # usa runner hospedado do GitHub
    steps:
      - name: Checkout                                  # baixa o repositório
        uses: actions/checkout@v4

      - name: Setup Python                              # provisiona Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps                              # instala libs do treino
        run: pip install -r coleta_dados/requirements.txt

      - name: Run training                              # executa pipeline de treino
        run: python coleta_dados/treinar_modelo.py

      - name: Upload ML artifacts                       # publica artefatos gerados pelo treino
        uses: actions/upload-artifact@v4
        with:
          name: ml-artifacts
          path: |
            coleta_dados/ia_params.h
            coleta_dados/*.pkl
            coleta_dados/*.csv

  # --------------------------------------------
  # 2) Build do firmware com setup-esp-idf (CI)
  # --------------------------------------------
  build-firmware:
    if: ${{ github.event.inputs.run_build == 'yes' }}   # só roda se o input for "yes"
    runs-on: ubuntu-latest                              # runner hospedado (limpo e reprodutível)
    needs: [train-ml]                                   # espera o treino (para baixar artefatos)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ML artifacts (se houver)         # traz ia_params.h / pesos etc. para o projeto
        if: ${{ github.event.inputs.run_train == 'yes' }}
        uses: actions/download-artifact@v4
        with:
          name: ml-artifacts
          path: esp32_firmware/components/ml

      - name: Setup ESP-IDF (Espressif action)          # instala e configura o ESP-IDF automaticamente
        uses: espressif/setup-esp-idf@v1
        with:
          version: v5.4.1                                # versão do ESP-IDF a usar (ajuste se quiser)
          # target é detectado pelo projeto; se quiser forçar: target: esp32s3

      - name: Build firmware (com versionamento)        # compila e embute versão via PROJECT_VER
        run: |
          GIT_BRANCH="${GITHUB_REF_NAME}"
          GIT_SHA_SHORT="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          BUILD_DATE="$(date -u +%Y%m%d)"
          FW_VERSION="${GIT_BRANCH}-${GIT_SHA_SHORT}-${BUILD_DATE}-run${GITHUB_RUN_NUMBER}"
          echo "Firmware version: ${FW_VERSION}"
          cd esp32_firmware
          idf.py -DPROJECT_VER="${FW_VERSION}" build

      - name: Rename final .bin                         # padroniza o nome do binário para OTA
        run: |
          cd esp32_firmware/build
          # descobre o app bin gerado (1º .bin que não é bootloader/partition/ota_data)
          APP_BIN="$(ls -1 *.bin | grep -v -E 'bootloader|partition|ota_?data' | head -n1)"
          cp "$APP_BIN" ia_automated_irrigation_system.bin
          ls -lh ia_automated_irrigation_system.bin

      - name: Upload firmware                           # publica o .bin renomeado como artefato
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: esp32_firmware/build/ia_automated_irrigation_system.bin

  # -------------------------------------------------------
  # 3) OTA
  # -------------------------------------------------------
  ota-deploy:
    if: ${{ github.event.inputs.deploy_ota == 'yes' }}  # só roda se o input for "yes"
    runs-on: [self-hosted, Linux, X64]                  # usa seu runner local (tem acesso à sua rede)
    needs: [build-firmware]                             # exige firmware já buildado
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download firmware                         # baixa o binário gerado no job anterior
        uses: actions/download-artifact@v4
        with:
          name: firmware-bin
          path: .

      - name: Deploy OTA to ESP32                       # envia o binário ao endpoint /ota do seu firmware
        env:
          OTA_TOKEN: ${{ secrets.OTA_TOKEN }}          # token Bearer (GitHub Secrets)
          ESP32_IP:  ${{ secrets.ESP32_IP }}           # IP do dispositivo
          OTA_PORT:  ${{ secrets.OTA_PORT }}           # porta do endpoint (ex.: 8070)
        run: |
          curl -v --http1.1 \
            -H "Connection: close" \
            -H "Content-Type: application/octet-stream" \
            -H "Authorization: Bearer ${OTA_TOKEN}" \
            --data-binary @ia_automated_irrigation_system.bin \
            http://${ESP32_IP}:${OTA_PORT}/ota
