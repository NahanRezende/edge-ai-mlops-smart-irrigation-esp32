name: CI/CD Irrigação Inteligente  # nome do workflow

on:
  workflow_dispatch:
    inputs:
      run_train:
        description: "Rodar treino de ML?"
        type: choice
        options: [ "yes", "no" ]
        default: "yes"
      run_build:
        description: "Rodar build do firmware?"
        type: choice
        options: [ "yes", "no" ]
        default: "yes"
      deploy_ota:
        description: "Fazer OTA no ESP32?"
        type: choice
        options: [ "yes", "no" ]
        default: "no"

jobs:
  # =========================
  # 1) Treino de ML (self-hosted)
  # =========================
  train-ml:
    if: ${{ github.event.inputs.run_train == 'yes' }}
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r treinamento_externo/requirements.txt

      - name: Run training
        run: python treinamento_externo/treinar_modelo.py

      - name: Upload ML artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-artifacts
          path: |
            treinamento_externo/ia_params.h
            treinamento_externo/*.pkl
            treinamento_externo/*.csv

  # ===================================
  # 2) Build do firmware ESP32 (SELF-HOSTED)
  #    - Espera o train-ml quando ele roda
  #    - Faz build usando seu ESP-IDF local
  # ===================================
  build-firmware:
    runs-on: [self-hosted, Linux, X64]
    needs: [train-ml]
    # Se run_build = yes E (train-ml teve sucesso OU foi pulado porque run_train = no)
    if: ${{ github.event.inputs.run_build == 'yes' && (needs.train-ml.result == 'success' || needs.train-ml.result == 'skipped') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Só baixa artefato se o train-ml realmente rodou e subiu
      - name: Download ML artifacts (only if trained)
        if: ${{ needs.train-ml.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: ml-artifacts
          path: ml-artifacts

      - name: Place generated header (if present)
        run: |
          mkdir -p esp32_firmware/main/ia
          if [ -f ml-artifacts/ia_params.h ]; then
            cp ml-artifacts/ia_params.h esp32_firmware/main/ia/ia_params.h
          fi
          ls -l esp32_firmware/main/ia || true

      - name: Build firmware (self-hosted)
        working-directory: esp32_firmware
        run: |
          set -euo pipefail
          # Carrega seu ambiente do ESP-IDF neste step
          source "$HOME/esp/esp-idf/export.sh"
          idf.py --version
          idf.py set-target esp32s3

          GIT_BRANCH="${GITHUB_REF_NAME}"
          GIT_SHA_SHORT="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          BUILD_DATE="$(date -u +%Y%m%d)"
          FW_VERSION="${GIT_BRANCH}-${GIT_SHA_SHORT}-${BUILD_DATE}-run${GITHUB_RUN_NUMBER}"
          echo "Firmware version: ${FW_VERSION}"

          idf.py -DPROJECT_VER="${FW_VERSION}" build
          ls -l build/*.bin

          # Garante o nome final
          if [ ! -f build/ia_automated_irrigation_system.bin ]; then
            APP_BIN="$(ls -S build/*.bin | head -n1)"
            cp "$APP_BIN" build/ia_automated_irrigation_system.bin
          fi

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: esp32_firmware/build/ia_automated_irrigation_system.bin

  # =========================
  # 3) OTA para o ESP32 (self-hosted)
  # =========================
  ota-deploy:
    if: ${{ github.event.inputs.deploy_ota == 'yes' }}
    runs-on: [self-hosted, Linux, X64]
    needs: [build-firmware]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware-bin
          path: .

      - name: Deploy OTA to ESP32
        env:
          OTA_TOKEN: ${{ secrets.OTA_TOKEN }}
          ESP32_IP:  ${{ secrets.ESP32_IP }}
          OTA_PORT:  ${{ secrets.OTA_PORT }}
        run: |
          curl -v --http1.1 \
            -H "Connection: close" \
            -H "Content-Type: application/octet-stream" \
            -H "Authorization: Bearer ${OTA_TOKEN}" \
            --data-binary @ia_automated_irrigation_system.bin \
            http://${ESP32_IP}:${OTA_PORT}/ota
