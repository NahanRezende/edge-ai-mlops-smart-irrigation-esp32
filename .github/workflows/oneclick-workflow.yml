# CI/CD do meu projeto de Irrigação Inteligente
# Objetivo: (1) treinar o modelo em Python, (2) compilar o firmware ESP32-S3 usando meu runner
# e (3) opcionalmente fazer OTA no device da rede local.

name: CI/CD Irrigação Inteligente

on:
  # Disparo manualmente e escolho o que rodar
  workflow_dispatch:
    inputs:
      run_train:
        description: "Rodar treino de ML?"
        type: choice
        options: ["yes","no"]
        default: "no"
      run_build:
        description: "Rodar build do firmware?"
        type: choice
        options: ["yes","no"]
        default: "yes"
      deploy_ota:
        description: "Fazer OTA no ESP32?"
        type: choice
        options: ["yes","no"]
        default: "yes"

jobs:
  # 1) Treino de ML (self-hosted)
  train-ml:
    # só treina quando mandar (run_train == yes)
    if: ${{ github.event.inputs.run_train == 'yes' }}
    # roda no runner (Linux x64) pra usar ambiente local configurado na mesma rede da placa
    runs-on: [self-hosted, Linux, X64]
    steps:
      # baixa o repo dessa execução
      - name: Checkout
        uses: actions/checkout@v4

      # Python em 3.11 pra esse projeto
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # instala as deps do pipeline de treino
      - name: Install deps
        run: pip install -r treinamento_externo/requirements.txt

      # executa o script que treina e exporta o ia_params.h
      - name: Run training
        run: python treinamento_externo/treinar_modelo.py

      # publica os artefatos que o build do firmware pode precisar (ia_params.h, etc.)
      - name: Upload ML artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-artifacts
          path: |
            treinamento_externo/ia_params.h
            treinamento_externo/*.pkl
            treinamento_externo/*.csv

  # 2) Build do firmware ESP32 (SELF-HOSTED)
  build-firmware:
    # compila no runner pra reaproveitar toolchain/IDF local (precisa ter isso configurado)
    runs-on: [self-hosted, Linux, X64]
    # espera o job de treino (quando existir) pra poder baixar os artefatos
    needs: [train-ml]
    # regra: Só faz build se (run_build == yes) e:
    # - o treino deu success OU
    # - o treino foi pulado (run_train == no)
    if: ${{ github.event.inputs.run_build == 'yes' && (needs['train-ml'].result == 'success' || needs['train-ml'].result == 'skipped') }}

    steps:
      # baixa o repo dessa execução
      - name: Checkout
        uses: actions/checkout@v4

      # se o treino rodou, baixa os artefatos dele
      - name: Download ML artifacts (only if trained)
        if: ${{ needs['train-ml'].result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: ml-artifacts
          path: ml-artifacts

      # se o ia_params.h existir, coloca no lugar que o firmware inclui
      - name: Place generated header (if present)
        run: |
          mkdir -p esp32_firmware/main/ia
          [ -f ml-artifacts/ia_params.h ] && cp ml-artifacts/ia_params.h esp32_firmware/main/ia/ia_params.h || true

      # build do ESP-IDF:
      # carrega o export.sh no MESMO step (o runner não herda a shell entre steps)
      - name: Build firmware
        working-directory: esp32_firmware
        run: |
          set -euo pipefail
          # carrego o ambiente do IDF
          source "$HOME/esp/esp-idf/export.sh"
          idf.py set-target esp32s3

          # versão do firmware com branch + sha curto + data + número do run
          GIT_BRANCH="${GITHUB_REF_NAME}"
          GIT_SHA_SHORT="${GITHUB_SHA:0:7}"
          BUILD_DATE="$(date -u +%Y%m%d)"
          FW_VERSION="${GIT_BRANCH}-${GIT_SHA_SHORT}-${BUILD_DATE}-run${GITHUB_RUN_NUMBER}"
          idf.py -DPROJECT_VER="${FW_VERSION}" build

          # se o nome final não existir, eu pego o maior .bin (app) e padronizo
          [ -f build/ia_automated_irrigation_system.bin ] || cp "$(ls -S build/*.bin | head -n1)" build/ia_automated_irrigation_system.bin

      # publica o .bin pra etapa de OTA
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: esp32_firmware/build/ia_automated_irrigation_system.bin

  # 3) OTA (self-hosted)
  ota-deploy:
    # só faz deploy com OTA quando pedir explicitamente
    if: ${{ github.event.inputs.deploy_ota == 'yes' }}
    runs-on: [self-hosted, Linux, X64]
    # preciso do binário do build
    needs: [build-firmware]
    # APENAS secrets (sem fallback pra vars)
    env:
      ESP32_IP:  ${{ secrets.ESP32_IP }}     # ex.: 192.168.1.9
      OTA_PORT:  ${{ secrets.OTA_PORT }}     # ex.: 8070
      OTA_TOKEN: ${{ secrets.OTA_TOKEN }}    # Configurado porém é bom manter em segredo
    steps:
      # baixa o .bin gerado no job anterior
      - name: Download firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware-bin
          path: .

      # envia o .bin por HTTP/1.1 como octet-stream pro endpoint /ota do firmware
      - name: Deploy OTA
        run: |
          set -euo pipefail
          HDR_AUTH=()
          [ -n "${OTA_TOKEN:-}" ] && HDR_AUTH+=( -H "Authorization: Bearer ${OTA_TOKEN}" )
          curl -v --http1.1 --fail-with-body \
            -H "Connection: close" \
            -H "Content-Type: application/octet-stream" \
            "${HDR_AUTH[@]}" \
            --data-binary @ia_automated_irrigation_system.bin \
            "http://${ESP32_IP}:${OTA_PORT}/ota"
